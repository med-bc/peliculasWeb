<script>
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');

  searchBtn.addEventListener('click', () => {
    const termino = searchInput.value.trim();
    if (termino) {
      window.location.href = `resultados.html?q=${encodeURIComponent(termino)}`;
    }
  });
</script>

    <script>
        const btn = document.getElementById('verMasBtn');
        const cards = document.querySelectorAll('.peliculas-grid .card.hidden');
        let index = 0;
      
        btn.addEventListener('click', () => {
            let mostrados = 0;
            while (index < cards.length && mostrados < 4) {
                cards[index].classList.remove('hidden');
                index++;
                mostrados++;
            }
            if (index >= cards.length) {
                btn.style.display = 'none';
            }
        });
    </script>
