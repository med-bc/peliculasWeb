<div class="home-container">
  <!-- Banner con video de YouTube -->
  <section class="banner">
    <div class="video-container" [class.video-active]="videoPlaying">
      <iframe
        id="trailer-iframe"
        [src]="videoSrc"
        title="Tráiler principal"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>

    <div class="thumbnail-overlay" [class.hidden]="videoPlaying">
      <img
        src="https://img.youtube.com/vi/rQvIR1oL1vE/maxresdefault.jpg"
        alt="Thumbnail"
        class="thumbnail-img"
        (error)="thumbnailError = true">
      <div class="thumbnail-fallback" *ngIf="thumbnailError">
        <div class="play-icon">▶</div>
      </div>
      <div class="thumbnail-gradient"></div>
      <div class="banner-info">
        <h2>Serie Destacada</h2>
        <p>Ellie y Abby se enfrentan por venganza en un mundo roto.</p>
        <div class="banner-buttons">
          <button class="btn-trailer" (click)="playVideo()">▶ Ver Tráiler</button>
          <button class="btn-info" [routerLink]="['/detalle', 'serie', '2-bojack-horseman']">+ Información</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Películas de Estreno -->
  <section class="peliculas-section">
    <div class="section-header">
      <h2>Últimos Estrenos</h2>
    </div>
    <div class="grid-container">
          <div class="slide" *ngFor="let pelicula of peliculas" [routerLink]="getDetalleLink('pelicula', pelicula.id, pelicula.titulo)">
        <div class="slide-item">
          <img *ngIf="pelicula.imagenUrl" [src]="pelicula.imagenUrl" [alt]="pelicula.titulo" class="slide-image">
          <div *ngIf="!pelicula.imagenUrl" class="slide-placeholder"></div>
          <h3 class="slide-title">{{ pelicula.titulo }}</h3>
        </div>
      </div>
    </div>
    <div class="section-buttons">
      <button class="btn-ver-todo" routerLink="/peliculas">Ver todo</button>
    </div>
  </section>

  <!-- Películas y Series Recomendadas -->
  <section class="peliculas-section">
    <div class="section-header">
      <h2>Películas y Series Recomendadas</h2>
    </div>
    <div class="grid-container">
          <div class="slide" *ngFor="let serie of series" [routerLink]="getDetalleLink('serie', serie.id, serie.titulo)">
        <div class="slide-item">
          <img *ngIf="serie.imagenUrl" [src]="serie.imagenUrl" [alt]="serie.titulo" class="slide-image">
          <div *ngIf="!serie.imagenUrl" class="slide-placeholder"></div>
          <h3 class="slide-title">{{ serie.titulo }}</h3>
        </div>
      </div>
    </div>
    <div class="section-buttons">
      <button class="btn-ver-todo" routerLink="/series">Ver todo</button>
    </div>
  </section>
</div>
