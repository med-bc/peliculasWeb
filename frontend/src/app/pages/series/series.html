<div class="series-container">
  <div class="page-header">
    <h1>Series</h1>
  </div>

  <div class="grid-series">
      <div class="serie-card" *ngFor="let serie of series" [routerLink]="getDetalleLink(serie.id, serie.titulo)">
      <img class="serie-image" [src]="serie.imagenUrl" [alt]="serie.titulo"/>
      <h3>{{ serie.titulo }}</h3>
    </div>
  </div>

  <p *ngIf="series.length === 0" class="sin-resultados">No hay series disponibles.</p>
</div>
