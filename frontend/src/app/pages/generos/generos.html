<div class="generos-container">
  <div class="page-header">
    <h1>{{ genero | titlecase }}</h1>
    <p>Películas y series de {{ genero | lowercase }}</p>
  </div>

  <div class="grid-peliculas" *ngIf="!cargando">
    <ng-container *ngIf="contenidos.length > 0; else sinResultados">
      <div class="pelicula-card" *ngFor="let contenido of contenidos" [routerLink]="getDetalleLink(contenido)">
        <img class="pelicula-image" [src]="contenido.imagenUrl" [alt]="contenido.titulo">
        <h3>{{ contenido.titulo }}</h3>
      </div>
    </ng-container>
    <ng-template #sinResultados>
      <p class="sin-resultados">No hay contenido disponible en este género.</p>
    </ng-template>
  </div>

  <p *ngIf="cargando" class="sin-resultados">Cargando contenido...</p>
</div>
