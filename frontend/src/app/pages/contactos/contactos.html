<div class="contactos-container">
  <div class="page-header">
    <h1>Contactos</h1>
    <p>¿Tienes alguna pregunta? Nos gustaría escucharte</p>
  </div>

  <div class="contactos-content">
    <div class="contacto-info">
      <div class="info-item">
        <h3>Email</h3>
        <p>contact@cinescope.com</p>
      </div>
      <div class="info-item">
        <h3> Ubicación</h3>
        <p>Lima, Perú</p>
      </div>
      <div class="info-item">
        <h3> Teléfono</h3>
        <p>+51 (1) 2345-6789</p>
      </div>
    </div>

    <form class="contacto-form" (ngSubmit)="enviarMensaje()">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="formData.nombre" name="nombre" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required>
      </div>
      <div class="form-group">
        <label>Asunto</label>
        <input type="text" [(ngModel)]="formData.asunto" name="asunto" required>
      </div>
      <div class="form-group">
        <label>Mensaje</label>
        <textarea [(ngModel)]="formData.mensaje" name="mensaje" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn-enviar">Enviar Mensaje</button>
    </form>
  </div>
</div>
