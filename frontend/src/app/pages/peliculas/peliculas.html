<div class="peliculas-container">
  <div class="page-header">
    <h1>Películas</h1>
  </div>

  <div class="grid-peliculas">
      <div class="pelicula-card" *ngFor="let pelicula of peliculas" [routerLink]="getDetalleLink(pelicula.id, pelicula.titulo)">
      <img class="pelicula-image" [src]="pelicula.imagenUrl" [alt]="pelicula.titulo"/>
      <h3>{{ pelicula.titulo }}</h3>
    </div>
  </div>

  <p *ngIf="peliculas.length === 0" class="sin-resultados">No hay películas disponibles.</p>
</div>
