<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Bienvenido de nuevo</h1>
      <p>Inicia sesión para continuar viendo películas y series</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="contrasena" name="contrasena" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Iniciar Sesión</button>
    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/home">Regístrate aquí</a></p>
    </div>
  </div>
</div>
